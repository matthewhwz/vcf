<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通讯录一键导入测试</title>
    <style>
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 80%;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        button {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>联系人导入测试</h2>
        <p>点击下方按钮将生成包含 3 个联系人的文件：<br><strong>测试-张三、测试-李四、测试-王五</strong></p>
        <button id="downloadBtn">保存到通讯录</button>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            // 1. 模拟数据
            const contacts = [
                { name: "测试-张三", tel: "13800138001" },
                { name: "测试-李四", tel: "13800138002" },
                { name: "测试-王五", tel: "13800138003" }
            ];

            // 2. 构造 VCF 字符串 (使用 3.0 版本)
            // 注意：FN 后面指定了 CHARSET=UTF-8 以防中文乱码
            let vcfContent = "";
            contacts.forEach(c => {
                vcfContent += "BEGIN:VCARD\n";
                vcfContent += "VERSION:3.0\n";
                vcfContent += `FN;CHARSET=UTF-8:${c.name}\n`;
                vcfContent += `TEL;TYPE=CELL:${c.tel}\n`;
                vcfContent += "END:VCARD\n";
            });

            // 3. 转换为 Blob，明确指定编码为 UTF-8
            const blob = new Blob([vcfContent], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);

            // 4. 创建隐藏链接并触发下载
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'test_contacts.vcf');
            document.body.appendChild(link);
            link.click();

            // 5. 释放资源
            document.body.removeChild(link);
            setTimeout(() => window.URL.revokeObjectURL(url), 100);
        });
    </script>

</body>
</html>
