<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通讯录批量导入</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .btn { background: #007aff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { background: #0056b3; }
    </style>
</head>
<body>

    <button class="btn" onclick="exportMultiVcf()">点击：保存全部 3 个联系人</button>

    <script>
        function exportMultiVcf() {
            // 1. 定义数据
            const contacts = [
                { name: "测试-张三", tel: "13800138001" },
                { name: "测试-李四", tel: "13800138002" },
                { name: "测试-王五", tel: "13800138003" }
            ];

            // 2. 构造 VCF 字符串
            // 关键点：必须使用 \r\n 换行，必须包含 N 字段，必须声明 CHARSET
            let vcfString = "";
            contacts.forEach(c => {
                vcfString += "BEGIN:VCARD\r\n";
                vcfString += "VERSION:3.0\r\n";
                vcfString += `FN;CHARSET=UTF-8:${c.name}\r\n`;
                vcfString += `N;CHARSET=UTF-8:${c.name};;;;\r\n`; // iOS 识别多联系人的核心
                vcfString += `TEL;TYPE=CELL:${c.tel}\r\n`;
                vcfString += "END:VCARD\r\n";
            });

            // 3. 将字符串转为 Base64 编码
            // 这是为了解决部分移动端浏览器不识别 Blob URL 的问题
            const base64Vcf = btoa(unescape(encodeURIComponent(vcfString)));
            const dataUrl = 'data:text/vcard;base64,' + base64Vcf;

            // 4. 触发下载
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = 'contacts.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
