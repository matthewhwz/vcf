<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联络人导入</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; background: #f2f2f7; }
        .btn { 
            background: #007AFF; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 12px; font-weight: bold;
            display: inline-block; cursor: pointer; border: none; font-size: 18px;
        }
        .guide { margin-top: 30px; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <h2>同步办公通讯录</h2>
    <p>点击下方按钮开始下载</p>

    <button id="downloadBtn" class="btn">立即导入联系人</button>

    <div class="guide">
        <strong>iPhone 特别提示：</strong><br>
        1. 下载后若进入预览页，点击底部的 <b>“分享”</b> 图标。<br>
        2. 在列表中找到并选择 <b>“通讯录”</b>。<br>
        3. 点击右上角的 <b>“存储全部”</b>。
    </div>

    <script>
        document.getElementById('downloadBtn').onclick = async function() {
            try {
                // 1. 获取同级目录下的 vcf 文件
                const response = await fetch('contacts.vcf');
                const text = await response.text();
                
                // 2. 转换为 Blob，强制使用字节流类型，诱导系统弹出“下载”而非直接预览
                const blob = new Blob([text], { type: 'application/octet-stream' });
                const url = window.URL.createObjectURL(blob);
                
                // 3. 模拟点击下载
                const a = document.createElement('a');
                a.href = url;
                a.download = 'contacts.vcf';
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                alert('下载失败，请尝试刷新页面');
            }
        };
    </script>
</body>
</html>
